name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ["22.x"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - name: Install (workspaces)
        run: npm ci
      - name: Build (backend tsc + frontend vite)
        run: npm run build
      - name: Typecheck
        run: npm run lint --workspaces --if-present
      - name: Test (non-blocking — no DB in CI)
        run: npm test --workspaces --if-present || true
